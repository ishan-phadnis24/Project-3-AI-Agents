<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="status-row">
          <div>
            <p class="eyebrow">Classic Mode</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </div>

        <div class="actions">
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>

        <div
          id="game-board"
          class="board"
          role="grid"
          aria-label="Snake game board"
        ></div>

        <p id="message" class="message" aria-live="polite">
          Use arrow keys or WASD to start playing.
        </p>

        <div class="controls" aria-label="Touch controls">
          <button data-direction="up" aria-label="Move up">Up</button>
          <div class="controls-row">
            <button data-direction="left" aria-label="Move left">Left</button>
            <button data-direction="down" aria-label="Move down">Down</button>
            <button data-direction="right" aria-label="Move right">Right</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
